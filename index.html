<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSSウィザード v5</title>
<style>
:root {
  --bg:#fafaf8;--surface:#fff;--border:#e8e6e0;--border-s:#c8c4bc;
  --text:#1a1814;--muted:#7a7670;--accent:#1a1814;--accent-l:#f0ede6;
  --r:10px;--rs:6px;--shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
  --orange:#E8561E;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Meiryo','Hiragino Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:24px 16px 60px}
.wrap{max-width:980px;margin:0 auto}
h1{font-size:18px;font-weight:700;letter-spacing:-.02em;margin-bottom:4px}
.sub{font-size:13px;color:var(--muted);margin-bottom:22px}
/* TABS */
.tabs{display:flex;border-bottom:1.5px solid var(--border);margin-bottom:22px}
.tab{padding:9px 16px;font-size:13px;font-weight:500;background:none;border:none;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1.5px;font-family:inherit;transition:color .15s;white-space:nowrap}
.tab:hover{color:var(--text)}.tab.active{color:var(--text);border-bottom-color:var(--text)}
.tc{display:none}.tc.active{display:block}
/* LAYOUT */
.two{display:grid;grid-template-columns:1fr 290px;gap:16px;align-items:start}
@media(max-width:700px){.two{grid-template-columns:1fr}}
/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;box-shadow:var(--shadow)}
.slabel{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
/* STEPBAR */
.sbar{display:flex;align-items:center;margin-bottom:5px}
.sdot{width:23px;height:23px;border-radius:50%;border:1.5px solid var(--border-s);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--muted);flex-shrink:0;background:var(--surface);transition:all .2s}
.sdot.done{background:var(--accent);color:#fff;border-color:var(--accent)}.sdot.act{border-color:var(--accent);color:var(--accent)}
.sl{flex:1;height:1.5px;background:var(--border)}.sl.done{background:var(--accent)}
.slbs{display:flex;justify-content:space-between;margin-bottom:16px}
.slb{font-size:10px;color:var(--muted);text-align:center;flex:1}.slb.act{color:var(--text);font-weight:600}
/* CHIPS */
.q{font-size:14px;font-weight:600;margin-bottom:11px;line-height:1.4}
.subq{font-size:12px;color:var(--muted);margin-bottom:9px}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.chip{padding:5px 11px;border:1.5px solid var(--border-s);border-radius:20px;font-size:12px;color:var(--muted);background:var(--surface);cursor:pointer;font-family:inherit;transition:all .12s}
.chip:hover{border-color:var(--accent);color:var(--text);background:var(--accent-l)}
.chip.sel{border-color:var(--accent);color:#fff;background:var(--accent);font-weight:500}
.cg-label{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;letter-spacing:.04em}
.cg{margin-bottom:12px}
/* COLOR */
.cgrid{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}
.ci{text-align:center}
.cs{width:34px;height:34px;border-radius:7px;cursor:pointer;border:2px solid transparent;display:block;transition:transform .1s}
.cs:hover{transform:scale(1.1)}.cs.sel{border:2.5px solid var(--accent);box-shadow:0 0 0 3px rgba(0,0,0,.1)}
.cname{font-size:9px;color:var(--muted);margin-top:2px}
.cust{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.cust input[type=color]{width:36px;height:32px;border:1.5px solid var(--border-s);border-radius:6px;padding:2px;cursor:pointer;background:none}
.cust label{font-size:12px;color:var(--muted)}.cust span{font-size:12px;font-family:monospace;color:var(--text)}
/* SLIDER */
.srow{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.srow label{font-size:12px;color:var(--muted);min-width:55px}
.srow input[type=range]{flex:1;accent-color:var(--accent)}
.sval{font-size:13px;font-weight:600;min-width:36px;color:var(--text);text-align:right}
/* VAR GRID */
.vgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
@media(max-width:500px){.vgrid{grid-template-columns:1fr}}
.vi{display:flex;flex-direction:column;gap:4px}
.vi label{font-size:12px;color:var(--muted);font-weight:500}
.vi-row{display:flex;align-items:center;gap:7px}
.vi-row input[type=color]{width:34px;height:28px;border:1.5px solid var(--border-s);border-radius:5px;padding:2px;cursor:pointer;background:none;flex-shrink:0}
.vi-row input[type=text]{flex:1;padding:5px 7px;border:1.5px solid var(--border-s);border-radius:5px;font-size:12px;font-family:monospace;color:var(--text);background:var(--surface)}
.vi-row input[type=text]:focus{outline:none;border-color:var(--accent)}
/* NOTE */
.note{font-size:11px;color:var(--muted);background:var(--accent-l);border-radius:var(--rs);padding:6px 10px;margin-bottom:9px;line-height:1.6;border-left:2px solid var(--border-s)}
/* NAV */
.nav{display:flex;gap:7px;margin-top:12px;flex-wrap:wrap;align-items:center}
.btn{padding:7px 15px;font-size:13px;border-radius:var(--rs);cursor:pointer;font-family:inherit;transition:all .12s;border:1.5px solid transparent}
.btn-b{background:none;border-color:var(--border-s);color:var(--muted)}.btn-b:hover{background:var(--accent-l);color:var(--text)}
.btn-n{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:500}.btn-n:hover{opacity:.85}.btn-n:disabled{opacity:.3;cursor:default}
.btn-o{background:none;border-color:var(--border-s);color:var(--muted)}.btn-o:hover{background:var(--accent-l);color:var(--text)}
/* ACC */
.acc{background:var(--accent-l);border-radius:var(--rs);padding:7px 11px;margin-bottom:11px;font-size:12px;color:var(--muted);line-height:1.6}
.atag{display:inline-block;background:var(--surface);border:1px solid var(--border-s);border-radius:12px;font-size:11px;padding:2px 7px;margin:2px 2px 2px 0;color:var(--text)}
/* OUTPUT */
.ocard{background:#1a1814;border-radius:var(--r);padding:14px 16px;margin-top:10px}
.ocard textarea{font-family:'Consolas','Courier New',monospace;font-size:12px;line-height:1.85;color:#e8e6e0;background:transparent;border:none;outline:none;width:100%;height:520px;resize:vertical;white-space:pre;overflow:auto;}
.oactions{display:flex;gap:8px;margin-top:11px;flex-wrap:wrap}
.btn-cp{padding:7px 16px;font-size:13px;background:#fff;color:#1a1814;border:none;border-radius:var(--rs);cursor:pointer;font-family:inherit;font-weight:500}.btn-cp:hover{opacity:.85}
.btn-dk{padding:7px 14px;font-size:13px;background:none;border:1.5px solid #5a5650;color:#c8c4bc;border-radius:var(--rs);cursor:pointer;font-family:inherit}.btn-dk:hover{background:#2a2820;color:#fff}

/* ===== CHAT PREVIEW ===== */
.psticky{position:sticky;top:18px}
.plabel{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;display:flex;align-items:center;gap:6px}
.phl{font-size:10px;color:var(--orange);font-weight:600}
.cframe{border-radius:9px;overflow:hidden;border:1px solid var(--border);box-shadow:var(--shadow);font-size:12px}
/* preview parts */
.p-header{padding:9px 11px;font-size:13px;font-weight:600;color:#fff;display:flex;justify-content:space-between;align-items:center;transition:all .3s}
.p-body{padding:10px 8px;display:flex;flex-direction:column;gap:7px;min-height:160px;transition:background .3s}
.p-date{font-size:10px;text-align:center;transition:all .3s}
.p-bot-row{display:flex;gap:5px;align-items:flex-start}
.p-avatar{width:30px;height:30px;border-radius:50%;background:#ddd;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .3s}
.p-bot-tip{width:0;height:0;border-style:solid;border-width:5px 7px 5px 0;margin-top:7px;flex-shrink:0;transition:all .3s}
.p-bot-bubble{padding:7px 9px;font-size:11px;line-height:1.5;max-width:175px;transition:all .3s}
.p-choices{display:flex;flex-direction:column;gap:4px;margin-left:35px}
.p-choice{padding:5px 9px;font-size:11px;border:2px solid;transition:all .3s}
.p-user-row{display:flex;justify-content:flex-end}
.p-user-bubble{padding:7px 9px;font-size:11px;line-height:1.5;color:#fff;max-width:145px;transition:all .3s}
.p-user-icon-wrap{display:flex;justify-content:flex-end;gap:5px;align-items:flex-start}
.p-user-icon{width:26px;height:26px;border-radius:50%;background:#ddd;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .3s}
.p-survey{display:flex;gap:5px;margin-left:35px}
.p-sbtn{flex:1;padding:5px 0;font-size:11px;font-weight:600;text-align:center;border:2px solid;transition:all .3s}
.p-link{font-size:11px;text-decoration:underline;margin-left:35px;transition:color .3s}
.p-carousel{margin-left:35px;border:1px solid #ddd;border-radius:4px;overflow:hidden;font-size:10px;transition:all .3s}
.p-carousel-img{background:#f0f0f0;height:50px;display:flex;align-items:center;justify-content:center;color:#aaa;font-size:10px}
.p-carousel-text{padding:4px 7px;color:#555}
.p-carousel-btn{padding:4px 7px;border-top:1px solid #ddd;color:#1a56db;font-weight:500;cursor:default}
.p-typing{display:flex;gap:3px;margin-left:35px;align-items:center;transition:all .3s}
.p-typing span{width:6px;height:6px;border-radius:50%;display:inline-block}
.p-sug{background:#fff;border-radius:4px;margin-left:35px;overflow:hidden;transition:border-color .3s}
.p-sug-item{padding:4px 7px;font-size:10px;color:#555;border-bottom:1px solid #f0f0f0}
.p-sug-item:last-child{border-bottom:none}
.p-warn{font-size:10px;padding:4px 7px;border-radius:3px;margin:0 0 3px;transition:all .3s}
.p-footer{border-top:1px solid var(--border);padding:6px 7px;display:flex;gap:0;align-items:center;transition:background .3s}
.p-input{flex:1;border:1.5px solid #ddd;border-radius:3px 0 0 3px;padding:4px 7px;font-size:11px;font-family:inherit;background:#fff;height:28px;resize:none;transition:all .3s}
.p-send{height:28px;border:none;border-radius:0 3px 3px 0;font-size:10px;font-weight:600;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;min-width:38px;transition:all .3s}
/* launcher preview */
.p-launcher-area{background:#f0ede6;border-radius:8px;padding:10px;margin-top:8px}
.p-launcher-label{font-size:10px;color:var(--muted);margin-bottom:7px;font-weight:600}
.p-balloon{border-radius:8px;padding:10px;margin-bottom:6px;border:1px solid #000;background:#fff;font-size:11px;transition:all .3s}
.p-balloon-btn{padding:5px 9px;font-size:11px;border-radius:4px;background:#fff;border:2px solid #000;margin-top:5px;display:inline-block;transition:all .3s}
.p-launcher-icon{width:40px;height:40px;border-radius:50%;background:#000;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;margin-left:auto;transition:all .3s}
/* flash */
@keyframes flash{0%{outline:0 solid rgba(255,160,0,.6)}40%{outline:4px solid rgba(255,160,0,.5)}100%{outline:0 solid rgba(255,160,0,0)}}
.flash{animation:flash .55s ease-out}
</style>
</head>
<body>
<div class="wrap">
  <h1>CSSウィザード</h1>
  <p class="sub">ベースCSSをもとに、ボタン操作だけで最適なカスタムCSSを生成します</p>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('base',this)">① 全体の色味</button>
    <button class="tab" onclick="switchTab('parts',this)">② パーツ別カスタマイズ</button>
    <button class="tab" onclick="switchTab('output',this)">③ CSS出力</button>
  </div>

  <!-- TAB1 -->
  <div class="tc active" id="tab-base">
    <div class="two">
      <div class="card">
        <div class="slabel">全体カラー変数を設定</div>
        <p class="subq">変数を変更するだけでチャット全体の色味が変わります。</p>
        <div class="vgrid" id="var-grid"></div>
        <div style="display:flex;gap:7px;flex-wrap:wrap;margin-top:4px">
          <button class="btn btn-n" onclick="switchTab('parts',document.querySelectorAll('.tab')[1])">次へ →</button>
          <button class="btn btn-o" onclick="qp('dark')">ダーク</button>
          <button class="btn btn-o" onclick="qp('blue')">ブルー</button>
          <button class="btn btn-o" onclick="qp('green')">グリーン</button>
          <button class="btn btn-o" onclick="qp('warm')">ウォーム</button>
          <button class="btn btn-o" onclick="qp('reset')">リセット</button>
        </div>
      </div>
      <div class="psticky">
        <div class="plabel">プレビュー</div>
        <div class="cframe" id="cp-base"></div>
        <div class="p-launcher-area" id="cp-base-launcher"></div>
      </div>
    </div>
  </div>

  <!-- TAB2 -->
  <div class="tc" id="tab-parts">
    <div class="two">
      <div class="card">
        <div id="sbar-area"></div>
        <div id="wiz-area"></div>
      </div>
      <div class="psticky">
        <div class="plabel">プレビュー <span class="phl" id="hl-label"></span></div>
        <div class="cframe" id="cp-parts"></div>
        <div class="p-launcher-area" id="cp-parts-launcher"></div>
      </div>
    </div>
  </div>

  <!-- TAB3 -->
  <div class="tc" id="tab-output">
    <div class="card">
      <div class="slabel">生成されたCSS</div>
      <p class="subq">以下をコピーして、管理画面の「カスタムCSS」欄に貼り付けてください。</p>
      <div class="ocard"><textarea id="css-out" readonly spellcheck="false">/* まだ設定がありません */</textarea></div>
      <div class="oactions">
        <button class="btn-cp" onclick="copyAll()">全体をコピー</button>
        <button class="btn-dk" onclick="switchTab('base',document.querySelectorAll('.tab')[0])">← 最初に戻る</button>
      </div>
    </div>
  </div>
</div>

<script>
// ===== BASE CSS =====
const BASE_CSS=`/* --------------------------
    変数
----------------------------- */
:root {
  --body-font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen", "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue", "Helvetica", "Arial", sans-serif;
  --body-line-height: 1.5;
  --body-bg-color: {{bg}};
  --body-main-color-1: {{main}};
  --body-text-color-1: {{text}};
  --body-link-color: {{link}};
  --gray-color-1: {{gray1}};
  --gray-color-2: {{gray2}};
  --border-radius-1: {{radius1}};
  --border-radius-2: {{radius2}};
}
body, body *, button, input, select, textarea {
    font-family:var(--body-font-family)!important;
    line-height: var(--body-line-height) !important;
}
.content, .button { color: var(--body-text-color-1)!important; }
img { vertical-align: middle!important; }
*:focus,*:focus-visible { outline: none!important; }
.panel { border-radius: var(--border-radius-1)!important; }
div#message-wrapper { background: var(--body-bg-color)!important; }
.panel-heading {
    background: var(--body-main-color-1) !important;
    color: white !important;
    border-top-left-radius: var(--border-radius-1)!important;
    border-top-right-radius: var(--border-radius-1)!important;
    border-bottom-right-radius: 0px!important;
    border-bottom-left-radius: 0px!important;
}
div#messenger-header .action-button.toggle { opacity: 1!important; }
div#messenger-header .action-button.toggle>svg { display: none!important; }
div#messenger-header .action-button.toggle:after {
    content: "\\0d7" !important; opacity: 1 !important; color: white !important;
    line-height: 24px !important; font-family: 'Arial', sans-serif !important;
    font-size: 24px !important; display: inline-block !important;
}
.media-right { display: none!important; }
.request .box.content:after { content: none!important; }
.request .media-content { padding: 0!important; }
.message-wrapper .panel-block time { display: none!important; }
.event.is-complete-typing .buttons>button {
    background: white !important; height: auto !important;
    border: solid 3px {{choiceBorder}} !important;
    transition: 0.2s !important; color: var(--body-text-color-1) !important;
    box-shadow: none !important; white-space: normal!important;
    text-align: left!important; border-radius: var(--border-radius-2)!important; padding: 5px 12px!important;
}
.event.is-complete-typing .buttons>button:hover { background: {{choiceBorder}} !important; color: white !important; }
.launcher-wrapper div#launcher-agent .messenger {
    border-radius: var(--border-radius-1)!important; background: white !important;
    border: 1px solid var(--body-main-color-1) !important;
}
div#launcher-agent a.close1 { background: white !important; border: 1px solid var(--body-main-color-1) !important; }
.request .box.content {
    border-radius: var(--border-radius-1)!important; padding: 10px!important;
    font-weight: normal!important; background: {{userBubble}} !important; color: white !important;
}
.media-left { margin-right: 5px!important; }
.media-left img.bot-icon { width: 50px!important; height: 50px!important; }
.panel-block .response .box {
    margin-bottom: 10px!important; border-radius: var(--border-radius-1)!important;
    background: var(--gray-color-1)!important;
}
.panel-block .media-content.text .box:after {
    border-color:rgba(0,0,0,0) var(--gray-color-1)!important; top: 12px!important;
}
.media-content.text ul.buttons { border:none!important; margin-top: 0 !important; margin-bottom: 10px !important; }
.buttons>li[role="button"] {
    background-color: white !important; color: var(--body-text-color-1) !important;
    opacity: 1 !important; margin: 5px 0 0 !important;
    border: solid 3px {{choiceBorder}} !important; font-weight: normal !important;
    transition: 0.2s !important; border-radius: var(--border-radius-2)!important; padding: 8px 12px !important;
}
.media-content.text ul.buttons>li[role="button"]:hover { background: {{choiceBorder}} !important; color: white !important; }
ul.carousel>li { padding: 10px!important; background: white!important; }
ul.carousel .carousel-inner {
    border-radius: var(--border-radius-1)!important; padding: 0!important;
    border: solid 1px var(--gray-color-2)!important; background: white!important;
}
.carousel-inner .carousel-button { cursor: pointer !important; border-color: var(--gray-color-2)!important; color: var(--body-main-color-1) !important; }
.carousel-inner .carousel-text { padding: 8px!important; font-size: 14px!important; font-weight: normal!important; }
.carousel-inner .carousel-text+.carousel-button { margin-top: 0!important; }
a.link-urltext, a.link-url {
    color: var(--body-link-color) !important; font-weight: normal!important;
    text-decoration: underline!important; cursor: pointer !important; position: relative!important;
}
a.link-urltext:hover, a.link-url:hover { text-decoration: underline !important; background-color: transparent!important; }
.reply-selector a.button {
    border: none !important; border-radius: var(--border-radius-2)!important;
    transition: 0.2s !important; border: 3px solid var(--body-main-color-1) !important;
    width: calc(50% - 7px)!important; background: var(--body-main-color-1) !important; color: white !important;
}
.reply-selector a.button.is-medium.second.answer-no {
    background: var(--gray-color-2) !important; border-color: var(--gray-color-2) !important;
    color: var(--body-text-color-1) !important;
}
.reply-selector a.button.first:hover { background-color:white!important; color: var(--body-text-color-1)!important; }
.reply-selector a.button.is-medium.second.answer-no:hover { background-color:white!important; color: var(--body-text-color-1)!important; }
#message-wrapper .panel-block[data-event-type="error"] .error {
    border-radius: var(--border-radius-1)!important; border: 1px solid #fd2b5c !important; background: white !important;
}
#message-sender .warning { background: white !important; border-radius: var(--border-radius-1)!important; }
.control.has-addons .button, .control.has-addons .input, .control.has-addons .select { margin-right:0!important; }
.control.has-addons .input {
    border-top-left-radius: 0px!important; border-top-right-radius: 0px!important;
    border-bottom-right-radius: 0px!important; border-bottom-left-radius: var(--border-radius-1)!important;
}
a#send-message {
    border-top-left-radius: 0px !important; border-top-right-radius: 0px !important;
    border-bottom-right-radius: var(--border-radius-1) !important; border-bottom-left-radius: 0px !important; width: 50px;
}
textarea#input-box {
    border-top-left-radius: 0px!important; border-top-right-radius: 0px!important;
    border-bottom-right-radius: 0px!important; border-bottom-left-radius: var(--border-radius-1)!important;
}
a.button.send-message { background: var(--body-main-color-1) !important; color: white !important; }
.suggestions { max-width: unset!important; border-color: var(--gray-color-2)!important; }
.suggestions * { border-color: var(--gray-color-2)!important; }
svg.icon-close { fill: var(--body-main-color-1)!important; }
#send-message span { display: none; }
#send-message::before {
    color: #fff !important; text-align: center !important; content: '';
    display: inline-block; width: 20px; height: 20px;
    background-image: url({{SEND_BTN_IMG}});
    background-size: contain; vertical-align: middle; background-repeat: no-repeat;
}

function renderVarGrid(){
  const g=document.getElementById('var-grid');
  g.innerHTML=VARS.map(v=>{
    const val=V[v.key];
    if(v.type==='radius'){
      const n=parseInt(val)||5;
      return `<div class="vi"><label>${v.label}<br><span style="font-weight:400;color:#aaa;font-size:11px">${v.desc}</span></label>
        <div class="srow" style="margin-bottom:3px"><input type="range" min="0" max="30" step="1" value="${n}" oninput="updR('${v.key}',this.value)"><span class="sval" id="rv-${v.key}">${n}px</span></div>
        <div class="chips" style="margin-bottom:0">${[0,4,5,8,12,20].map(r=>`<div class="chip ${n==r?'sel':''}" onclick="setR('${v.key}',${r})">${r===0?'四角':r+'px'}</div>`).join('')}</div>
      </div>`;
    }
    // input[type=color]はGASで使えないため、色見本+テキスト入力に変更
    const isHex=/^#[0-9a-fA-F]{3,8}$/.test(val);
    return `<div class="vi"><label>${v.label}<br><span style="font-weight:400;color:#aaa;font-size:11px">${v.desc}</span></label>
      <div class="vi-row">
        <div style="position:relative;flex-shrink:0">
          <div id="vc-${v.key}" style="width:34px;height:28px;border-radius:5px;background:${isHex?val:'#ccc'};border:1.5px solid var(--border-s);cursor:pointer" onclick="document.getElementById('vcp-${v.key}').click()"></div>
          <input type="color" id="vcp-${v.key}" value="${isHex?val:'#000000'}" style="position:absolute;opacity:0;width:0;height:0;top:0;left:0;pointer-events:none" oninput="updV('${v.key}',this.value)">
        </div>
        <input type="text" value="${val}" id="vt-${v.key}" oninput="updV('${v.key}',this.value)" placeholder="#000000">
      </div>
    </div>`;
  }).join('');
}
function updV(k,val){
  V[k]=val;
  // テキスト欄を同期
  const t=document.getElementById('vt-'+k);
  if(t&&t.value!==val) t.value=val;
  // 色見本divを同期
  const swatch=document.getElementById('vc-'+k);
  const isValidHex=/^#[0-9a-fA-F]{6}$/.test(val)||/^#[0-9a-fA-F]{3}$/.test(val);
  if(swatch&&isValidHex) swatch.style.background=val;
  // 隠しカラーピッカーを同期
  const cp=document.getElementById('vcp-'+k);
  if(cp&&isValidHex) cp.value=val;
  renderPreview('cp-base','cp-base-launcher');
  renderPreview('cp-parts','cp-parts-launcher');
}

  const t=document.getElementById('vt-'+k);

function updR(k,val){V[k]=val+'px';const e=document.getElementById('rv-'+k);if(e)e.textContent=val+'px';renderPreview('cp-base','cp-base-launcher');renderPreview('cp-parts','cp-parts-launcher');}
function setR(k,val){V[k]=val+'px';const e=document.getElementById('rv-'+k);if(e)e.textContent=val+'px';const s=document.querySelector(`input[oninput*="updR('${k}'"]`);if(s)s.value=val;document.querySelectorAll(`[onclick*="setR('${k}'"]`).forEach(c=>c.classList.toggle('sel',parseInt(c.textContent)==val||(c.textContent==='四角'&&val==0)));renderPreview('cp-base','cp-base-launcher');renderPreview('cp-parts','cp-parts-launcher');}

function html0(){
  const basicCount = GROUPS.flatMap(g=>g.parts).filter(p=>p.basic).length;
  const totalCount = GROUPS.flatMap(g=>g.parts).length;
  const allExpanded = GROUPS.every(g => expandedCats.has(g.cat));

  let h = renderAcc();
  h += `<div class="q">変更したいパーツを選んでください</div>`;

  h += `<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:8px 12px;background:var(--accent-l);border-radius:var(--rs)">
    <span style="font-size:12px;color:var(--muted)">表示モード：</span>

      <button onclick="expandAll()" style="padding:4px 14px;font-size:12px;background:${allExpanded?'var(--accent)':'transparent'};color:${allExpanded?'#fff':'var(--muted)'};border:none;cursor:pointer;font-family:inherit;transition:all .15s">すべて表示</button>
    </div>
    <span style="font-size:11px;color:var(--muted)">${expandedCats.size===0?`基本 ${basicCount}パーツ表示中`:`一部詳細展開中`}</span>
  </div>`;

  GROUPS.forEach(g => {
    const isExpanded = expandedCats.has(g.cat);
    const basicParts = g.parts.filter(p => p.basic);
    const advParts = g.parts.filter(p => !p.basic);
    const visibleParts = isExpanded ? g.parts : basicParts;
    const hasAdv = advParts.length > 0;

    h += `<div class="cg"><div class="cg-label" style="color:${CATCOL[g.cat]}">${g.label}</div>`;

    if (basicParts.length === 0 && !isExpanded) {
      // basicパーツが0件のカテゴリ（ランチャーなど）→ 詳細リンクだけ表示
      h += `<div style="font-size:12px;color:var(--muted);padding:2px 0 4px">
        <span onclick="toggleCat('${g.cat}')" style="cursor:pointer;text-decoration:underline">＋ 詳細変更はこちら（${advParts.length}件）</span>
      </div>`;
    } else {
      h += `<div class="chips">`;
      visibleParts.forEach(p => {
        // そのパーツに設定済み値があるか確認
        const map = PART_CSS_MAP[p.id];
        const hasConfig = map && Object.keys(map.props).some(prop => getCurrentVal(p.id, prop));
        const dot = hasConfig ? `<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#4f6ef7;margin-left:4px;vertical-align:middle;flex-shrink:0;margin-top:-1px" title="設定値あり"></span>` : '';
        h += `<div class="chip ${wizState.part===p.id?'sel':''}" onclick="selPart('${p.id}',this)" style="display:inline-flex;align-items:center">${p.label}${dot}</div>`;
      });
      h += `</div>`;
      if (hasAdv && !isExpanded) {
        h += `<div style="font-size:12px;margin:-4px 0 6px">
          <span onclick="toggleCat('${g.cat}')" style="cursor:pointer;color:var(--muted);text-decoration:underline">＋ 詳細変更はこちら（${advParts.length}件）</span>
        </div>`;
      } else if (hasAdv && isExpanded) {
        h += `<div style="font-size:12px;margin:-4px 0 6px">
          <span onclick="toggleCat('${g.cat}')" style="cursor:pointer;color:var(--muted);text-decoration:underline">− 折りたたむ</span>

      }
    }
    h += `</div>`;
  });

  h += `<div class="nav"><button class="btn btn-n" onclick="gs(1)" ${!wizState.part?'disabled':''}>次へ →</button></div>`;

    body=`<div class="srow"><label>角丸</label><input type="range" min="0" max="50" step="1" value="${sRad}" oninput="chRad(this.value)"><span class="sval" id="rv">${sRad}px</span></div>
    <div class="chips">${[0,4,5,8,12,20,50].map(r=>`<div class="chip ${sRad==r?'sel':''}" onclick="setRad(${r})">${r===0?'四角':r===50?'楕円':r+'px'}</div>`).join('')}</div>`;
  } else if(isSz){
    const max=prop==='幅'?200:prop==='高さ'?100:30;
    body=`<div class="srow"><label>${prop}</label><input type="range" min="8" max="${max}" step="1" value="${sSz}" oninput="chSz(this.value)"><span class="sval" id="szv">${sSz}px</span></div>`;
  } else if(isM){
    body=`<div class="srow"><label>余白</label><input type="range" min="-30" max="10" step="1" value="${sMargin}" oninput="chMargin(this.value)"><span class="sval" id="mv">${sMargin}px</span></div>
    <div class="subq" style="margin-top:-4px">マイナス値で吹き出しと選択肢の間を詰められます</div>`;
  } else if(isPct){
    body=`<div class="srow"><label>列幅</label><input type="range" min="10" max="50" step="5" value="${sPct}" oninput="chPct(this.value)"><span class="sval" id="pv">${sPct}%</span></div>
    <div class="subq" style="margin-top:-4px">25%=4列、33%=3列、50%=2列</div>`;
  }

  const canNext=isH||isSpecial||(isC&&sCol)||(isFont&&sFont)||isR||isSz||isM||isPct||(isTxt&&sText)||(isUrl&&sUrl);
  const badge = currentValBadge(wizState.part, prop);
  return renderAcc()+`<div class="q">${pl}の${prop}を設定してください</div>${badge}${body}
  <div class="nav"><button class="btn btn-b" onclick="clearLiveOv();gs(1)">← 戻る</button><button class="btn btn-n" id="ban" onclick="applyWiz()" ${canNext?'':'disabled'}>確定してCSSに追加</button></div>`;
}

function applyWiz(){
  const p=PARTS.find(x=>x.id===wizState.part);
  const prop=wizState.prop;
  const isC=['背景色','文字色','枠線色','色変更','色変更（fill）','色変更（stroke）','アイコン色'].includes(prop);
  let val;
  if(prop==='非表示'||prop==='枠線非表示') val='none';
  else if(prop==='表示する') val='block';
  else if(['スライドイン有効化','折り返し有効化','outline非表示','初回のみ表示有効化'].includes(prop)) val='__special__';
  else if(prop==='ボタン名称（テキスト入力）') val=sText;
  else if(prop==='ホバー画像URL') val=sUrl;
  else if(isC) val=sCol;
  else if(prop==='フォント種類') val=sFont;
  else if(prop==='角丸') val=sRad;
  else if(prop==='余白調整（margin-bottom）') val=sMargin;
  else if(prop==='列幅（%）') val=sPct;
  else val=sSz;
  partAcc.push({partId:wizState.part,pl:p.label,sel:p.sel,prop,val});
  if(wizState.part&&wizState.prop) setOV(wizState.part,wizState.prop,val);
  wizState={part:null,prop:null};sCol=null;sFont=null;sRad=5;sSz=14;sMargin=-10;sPct=25;sText='';sUrl='';
  wizStep=3;renderWiz();
}

function buildPartCSS(){
  return partAcc.map(e=>{
    const p=e.prop,sel=e.sel,val=e.val;
    if(p==='非表示') return`/* ${e.pl}の${p} */\n${sel} {\n    display: none !important;\n}`;
    if(p==='枠線非表示') return`/* ${e.pl}の${p} */\n${sel} {\n    border: none !important;\n}`;
    if(p==='表示する') return`/* ${e.pl}の${p} */\n${sel} {\n    display: block !important;\n}`;
    if(p==='outline非表示') return`/* ${e.pl}の${p} */\n${sel} {\n    outline: none;\n}`;
    if(p==='折り返し有効化') return`/* ${e.pl}の${p} */\n${sel} {\n    white-space: normal;\n    height: auto;\n    padding-top: 5px;\n    padding-bottom: 5px;\n}`;
    if(p==='スライドイン有効化') return`/* ランチャースライドインアニメーション */\n.fade-enter-active {\n    transition: opacity 0s !important;\n    transition: right .6s cubic-bezier(0,0,.08,1) .2s !important;\n    position: relative !important;\n    right: -100% !important;\n}\n.fade-enter-to {\n    right: 0% !important;\n}`;
    if(p==='アイコン色') return`/* ${e.pl}の${p} */\n.icon-reload {\n    fill: ${val} !important;\n    stroke: ${val} !important;\n}`;
    if(p==='ボタン名称（テキスト入力）') {
      // cancel or send rename
      if(e.partId==='cancel-btn-rename') return`/* ${e.pl}の${p} */\nli.cancel-button span {\n    display: none !important;\n}\nli.cancel-button::before {\n    content: "${val}"; /* ボタン名 */\n}`;
      if(e.partId==='send-btn-rename') return`/* ${e.pl}の${p} */\n#send-message span {\n    display: none !important;\n}\n#send-message::before {\n    content: "${val}"; /* ボタン名 */\n    color: #FFFFFF;\n    font-size: 14px !important;\n}`;
      if(e.partId==='send-btn-sp-rename') return`/* ${e.pl}の${p} */\n#send-message span {\n    display: none !important;\n}\n.is-mobile-view #send-message::before {\n    content: "${val}"; /* SP時ボタン名 */\n    color: #FFFFFF;\n    font-size: 14px !important;\n}`;
    }
    if(p==='初回のみ表示有効化') return`/* ${e.pl}の${p} */\n/* 初回表示インテントあり：index="0"、なし：index="1" */\narticle[index="0"] .bot-icon {\n    visibility: visible;\n}\n.bot-icon {\n    visibility: hidden;\n}`;
    if(p==='ホバー画像URL') return`/* ${e.pl}の${p} */\n.launcher-icon:hover img {\n    opacity: 0 !important;\n}\n.launcher-icon:hover {\n    background-image: url('${val}');\n    background-size: contain;\n    background-repeat: no-repeat;\n    background-position: center;\n}`;
    let rule='';
    if(p==='背景色') rule=`    background-color: ${val} !important; /* 背景色 */`;
    else if(p==='文字色') rule=`    color: ${val} !important; /* 文字色 */`;
    else if(p==='枠線色') rule=`    border-color: ${val} !important;\n    border-style: solid !important; /* 枠線色 */`;
    else if(p==='色変更') rule=`    border-right-color: ${val} !important; /* 先端の色 */`;
    else if(p==='色変更（fill）') rule=`    fill: ${val} !important;`;
    else if(p==='色変更（stroke）') rule=`    stroke: ${val} !important;`;
    else if(p==='角丸') rule=`    border-radius: ${val}px !important;`;
    else if(p==='文字サイズ') rule=`    font-size: ${val}px !important;`;
    else if(p==='サイズ') rule=`    width: ${val}px !important;\n    height: ${val}px !important;`;
    else if(p==='幅') rule=`    width: ${val}px !important;`;
    else if(p==='高さ') rule=`    height: ${val}px !important;`;
    else if(p==='フォント種類') rule=`    font-family: ${val} !important;`;
    else if(p==='余白調整（margin-bottom）') rule=`    margin-bottom: ${val}px !important;`;
    else if(p==='列幅（%）') return`/* ${e.pl}の${p} */\n.buttons.row {\n    max-width: 100% !important;\n}\n.buttons.row > li {\n    width: ${val}% !important;\n}`;
    return`/* ${e.pl}の${p} */\n${sel} {\n${rule}\n}`;
  }).join('\n\n');
}

  const cb=()=>{const b=document.querySelector('.btn-cp');b.textContent='コピーしました ✓';setTimeout(()=>b.textContent='全体をコピー',2000);};

  // GASのiframe内ではnavigator.clipboardが使えないため
  // textarea経由のexecCommand('copy')を優先する
  const ta=document.getElementById('css-out');
  ta.select();
  ta.setSelectionRange(0,999999);
  try{
    const ok=document.execCommand('copy');
    if(ok){cb();return;}
  }catch(e){}

  // フォールバック：navigator.clipboard
  if(navigator.clipboard){
    navigator.clipboard.writeText(txt).then(cb).catch(()=>{
      cb(); // 失敗してもUIだけ更新
    });
  } else {
    cb();
  }
}

// CSS文字列からセレクタブロックを抽出してプロパティ値を返す（ショートハンド対応）
function parseCSSValue(cssText, selector, property) {
  const escaped = selector.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const pattern = new RegExp(escaped + '\\s*\\{([^}]+)\\}', 'gi');
  let lastMatch = null, m;
  while ((m = pattern.exec(cssText)) !== null) lastMatch = m;
  if (!lastMatch) return null;
  const block = lastMatch[1];

  // 完全一致プロパティ検索
  const propPattern = new RegExp('(?<![a-z-])' + property.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\s*:\\s*([^;!]+?)(?:\\s*!important)?\\s*;', 'i');
  const pm = block.match(propPattern);
  if (!pm) return null;
  const raw = pm[1].trim();

  // borderショートハンド（例: "solid 3px #000"）から色だけ抽出
  if (property === 'border' || property === 'border-color' || property === 'background' || property === 'background-color') {
    const colorMatch = raw.match(/(#[0-9a-fA-F]{3,8}|rgba?\([^)]+\)|white|black|transparent)/i);
    if (colorMatch) return colorMatch[1];
  }
  return raw;
}

// var() を実際の値に展開
function resolveVars(cssText) {
  return cssText
    .replace(/var\(--body-main-color-1\)/g, V.main)
    .replace(/var\(--body-bg-color\)/g, V.bg)
    .replace(/var\(--body-text-color-1\)/g, V.text)
    .replace(/var\(--body-link-color\)/g, V.link)
    .replace(/var\(--gray-color-1\)/g, V.gray1)
    .replace(/var\(--gray-color-2\)/g, V.gray2)
    .replace(/var\(--border-radius-1\)/g, V.radius1)
    .replace(/var\(--border-radius-2\)/g, V.radius2)
    .replace(/\{\{userBubble\}\}/g, V.userBubble)
    .replace(/\{\{choiceBorder\}\}/g, V.choiceBorder)
    .replace(/\{\{SEND_BTN_IMG\}\}/g, SEND_BTN_IMG);
}

// パーツIDとプロパティ名から現在値を取得
function getCurrentVal(partId, propLabel) {
  // bot-bubbleの文字色は別セレクタで取得
  const mapId = (partId === 'bot-bubble' && propLabel === '文字色') ? 'bot-bubble-color'
              : (partId === 'reload-btn' && propLabel === 'アイコン色') ? 'reload-btn-icon'
              : partId;
  const map = PART_CSS_MAP[mapId];
  if (!map || !map.props[propLabel]) return null;
  const cssProp = map.props[propLabel];
  const sel = map.sel;
  const fullCss = resolveVars(buildCSS()) + '\n' + resolveVars(buildPartCSS());
  return parseCSSValue(fullCss, sel, cssProp);
}

// 現在値バッジ
function currentValBadge(partId, propLabel) {
  const val = getCurrentVal(partId, propLabel);
  if (!val) return '';
  const isColor = /^#[0-9a-f]{3,8}$/i.test(val) || /^rgb/i.test(val) || /^white$|^black$/i.test(val);
  const dot = isColor ? `<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${val};border:1px solid rgba(0,0,0,.15);margin-right:3px;vertical-align:middle"></span>` : '';
  return `<div style="font-size:11px;color:var(--muted);background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:3px 8px;display:inline-flex;align-items:center;gap:2px;margin-bottom:8px">${dot}現在の設定値：<span style="font-family:monospace;color:var(--text)">${val}</span></div>`;
}
